name: build-push
on:
  push:
  workflow_dispatch:

jobs:
  base:
    strategy:
      fail-fast: false
      matrix:
        dir:
          - base
          - vault
    uses: libops/.github/.github/workflows/build-push.yaml@f39fff4fbd5096221d705143e88e5942f5d9a604 # main
    with:
      image: ${{ matrix.dir }}
      context: ${{ matrix.dir }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
